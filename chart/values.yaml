# Default values for project.
# This is a YAML-formatted file.
# Declare variables to be passed into your templates.
# fullnameOverride: blankcrm
replicaCount: 1

image:
  repository: simplify9/sw-surl-api
  tag: ""  # Will be set by CI/CD pipeline
  pullPolicy: IfNotPresent

# imagePullSecrets:
#   - name: sw-secret
  # Optionally specify an array of imagePullSecrets.
  # Secrets must be manually created in the namespace.
  # ref: https://kubernetes.io/docs/concepts/containers/images/#specifying-imagepullsecrets-on-a-pod
  #
  # This uses credentials from secret "myRegistryKeySecretName".
  # - name: myRegistryKeySecretName
service:
  type: ClusterIP
  port: 80

probes:
  enabled: false

# North-south routing. The chart uses ingress-nginx by default. Set
# gateway.enabled=true to switch to Gateway API (HTTPRoute) instead — this
# automatically suppresses the Ingress resource below.
ingress:
  enabled: true
  annotations:
    cert-manager.io/cluster-issuer: "letsencrypt-nginx"
    # nginx.ingress.kubernetes.io/rewrite-target: /$2
    # kubernetes.io/tls-acme: "true"
  path: /
  hosts:
  tls: []
    # - secretName: chart-example-tls
    #   hosts:
    #     - chart-example.local

# Gateway API (HTTPRoute). Disabled by default — the chart renders nothing
# Gateway-API-related unless gateway.enabled is set to true at deploy time.
# When enabled, the Ingress above is suppressed and routing works exactly like
# the Gateway API chart. Override parentRefs/hostnames/routes for your cluster.
gateway:
  enabled: false
  parentRefs:
    - name: public-gateway
      namespace: s9-dev-edge
      sectionName: https-wildcard-sf9-io
  hostnames:
    - s9genericapp.sf9.io
  routes:
    - path: "/"
      pathType: PathPrefix
      # Optional route-level timeouts (Gateway API v1.1+ standard channel).
      # Prevents slow backends from holding connections indefinitely.
      # Example:
      # timeout:
      #   request: "30s"         # Total client-to-backend request timeout
      #   backendRequest: "10s"  # Single backend attempt timeout
      backendRef:
        name: ""
        port: 80

secrets:

resources: {}
  # We usually recommend not to specify default resources and to leave this as a conscious
  # choice for the user. This also increases chances charts run on environments with little
  # resources, such as Minikube. If you do want to specify resources, uncomment the following
  # lines, adjust them as necessary, and remove the curly braces after 'resources:'.
  # limits:
  #  cpu: 100m
  #  memory: 128Mi
  # requests:
  #  cpu: 100m
  #  memory: 128Mi

nodeSelector: {}

tolerations: []

affinity: {}

# db is the connection string for the database
db: ""

dbConnectionStringName: ConnectionStrings__SurlDb

global:

  environment: Development

  token:
    key: '6547647654764764767657658658758765876532542'
    issuer: local
    audience: local



    


