{{- if .Values.gateway.enabled -}}
{{- $fullName := include "project.fullname" . -}}
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: {{ $fullName }}
  labels:
    {{- include "project.labels" . | nindent 4 }}
spec:
  parentRefs:
    {{- range .Values.gateway.parentRefs }}
    - name: {{ .name }}
      {{- with .namespace }}
      namespace: {{ . }}
      {{- end }}
      {{- with .sectionName }}
      sectionName: {{ . }}
      {{- end }}
    {{- end }}
  {{- if .Values.gateway.hostnames }}
  hostnames:
    {{- range .Values.gateway.hostnames }}
    - {{ . | quote }}
    {{- end }}
  {{- end }}
  rules:
    {{- range .Values.gateway.routes }}
    - matches:
        - path:
            type: {{ .pathType | default "PathPrefix" }}
            value: {{ .path | quote }}
      {{- with .timeout }}
      timeouts:
        {{- with .request }}
        request: {{ . }}
        {{- end }}
        {{- with .backendRequest }}
        backendRequest: {{ . }}
        {{- end }}
      {{- end }}
      backendRefs:
        - name: {{ dig "backendRef" "name" "" . | default $fullName }}
          port: {{ dig "backendRef" "port" 0 . | default $.Values.service.port }}
          {{- with dig "backendRef" "namespace" "" . }}
          namespace: {{ . }}
          {{- end }}
          {{- with dig "backendRef" "weight" 0 . }}
          weight: {{ . }}
          {{- end }}
    {{- end }}
{{- end }}
